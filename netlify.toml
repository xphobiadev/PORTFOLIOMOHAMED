[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "ADMIN_USERNAME,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,ADMIN_AUTH_TOKEN,ADMIN_PASSWORD,SUPABASE_SERVICE_ROLE_KEY,SUPABASE_DB_URL,DATABASE_URL,SUPABASE_PUBLISHABLE_KEY,SUPABASE_SECRET_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"
